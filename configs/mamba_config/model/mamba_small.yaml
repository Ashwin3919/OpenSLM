# Mamba SSM SLM — ~32 M parameters (no attention)
# 12 layers (more than GPT since each Mamba block is cheaper)
# d_model=384, d_state=16, d_conv=4, expand=2
model_type: mamba
model:
  vocab_size: 50257
  block_size: 128
  n_layer: 12
  d_model: 384
  d_state: 16
  d_conv: 4
  expand: 2
  dropout: 0.0
