# Training hyperparameters for BitNet SLM.
# BitNet may need slightly higher learning rate and more warmup steps.
training:
  max_iters: 20000
  batch_size: 32
  block_size: 128
  gradient_accumulation_steps: 32
  max_grad_norm: 1.0
  eval_interval: 500
  eval_batches: 500
  checkpoint_path: "outputs/bitnet/checkpoints/"
  resume_from: null

  optimizer:
    type: "adamw"
    learning_rate: 3.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.0
    eps: 1.0e-8

  scheduler:
    warmup_steps: 2000
    min_lr: 3.0e-5
