# Training hyperparameters — standard shared protocol for all SLM architectures.
training:
  max_iters: 20000
  batch_size: 32
  block_size: 128
  gradient_accumulation_steps: 32
  max_grad_norm: 1.0
  eval_interval: 500   # run evaluation every N iterations
  eval_batches: 500    # number of batches to average over during evaluation
  checkpoint_path: "outputs/<<MODEL_NAME>>/checkpoints/"
  resume_from: null

  optimizer:
    type: "adamw"
    learning_rate: 3.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.1
    eps: 1.0e-8

  scheduler:
    warmup_steps: 1000
    min_lr: 3.0e-5
