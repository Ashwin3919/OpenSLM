# Fast debug config — 10 iterations only, tiny batch
training:
  max_iters: 10
  batch_size: 2
  block_size: 128
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  eval_interval: 5
  eval_batches: 2
  checkpoint_path: "outputs/gemma3/checkpoints/"
  resume_from: null

  optimizer:
    type: "adamw"
    learning_rate: 1.0e-3
    betas: [0.9, 0.95]
    weight_decay: 0.1
    eps: 1.0e-8

  scheduler:
    warmup_steps: 5
    min_lr: 1.0e-4
