# DeepSeek-MoE SLM — ~48 M total, ~25 M active params per token
# 6 layers: layers 0,1 dense; layers 2-5 MoE (1 shared + 8 routed, top-2)
model_type: deepseek_moe
model:
  vocab_size: 50257
  block_size: 128
  n_layer: 6
  n_head: 6
  n_kv_head: 2
  n_embd: 384
  intermediate_size: 1024
  n_shared_experts: 1
  n_routed_experts: 8
  top_k: 2
  expert_hidden_dim: 256
  dense_layers: [0, 1]
  router_aux_loss_coef: 0.01
  dropout: 0.0
  rope_theta: 10000.0
