# Fast debug training config — 10 iterations, tiny batch.
# Use with deepseek_moe_small model for CI smoke tests and rapid iteration.
# Run: make train MODEL=deepseek_moe_config EXP=exp_001_baseline
training:
  max_iters: 10
  batch_size: 2
  block_size: 16
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  eval_interval: 100    # no eval during 10 iters
  eval_batches: 2
  checkpoint_path: "outputs/deepseek_moe/debug/checkpoints/"
  resume_from: null

  optimizer:
    type: "adamw"
    learning_rate: 1.0e-3
    betas: [0.9, 0.95]
    weight_decay: 0.1
    eps: 1.0e-9

  scheduler:
    warmup_steps: 5
    min_lr: 1.0e-4
