name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CPU-only PyTorch
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: pip install -e ".[dev]"

      - name: Core tests (no GPU, no network)
        run: pytest tests/test_core/ tests/test_infra/ -v --timeout=60

      - name: Pipeline smoke tests
        run: pytest tests/test_pipelines/test_training.py -v --timeout=120
